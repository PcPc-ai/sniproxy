name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w" -o sniproxy .

      - name: Package
        run: |
          PKG="sniproxy-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "$PKG"
          cp sniproxy config.yaml domains.csv start.sh README.md "$PKG/"
          tar -czf "${PKG}.tar.gz" "$PKG"
          sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: sniproxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            sniproxy-*.tar.gz
            sniproxy-*.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
